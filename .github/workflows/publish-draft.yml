name: Publicar post programado

on:
  schedule:
    # Lunes, miércoles y viernes a las 08:00 UTC (10:00 hora España)
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch: # Permitir ejecución manual

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Buscar y publicar drafts pendientes
        id: publish-drafts
        shell: bash
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Fecha de hoy: $TODAY"

          # Buscar TODOS los drafts con fecha <= hoy (recupera backlog)
          DRAFTS=$(find content/drafts -name "*.md" -type f 2>/dev/null | while read -r file; do
            DATE=$(grep -m1 '^date:' "$file" | sed 's/date:[[:space:]]*"\{0,1\}\([0-9-]*\)"\{0,1\}/\1/')
            if [[ -n "$DATE" && ! "$DATE" > "$TODAY" ]]; then
              echo "$DATE $file"
            fi
          done | sort)

          if [ -z "$DRAFTS" ]; then
            echo "No hay drafts pendientes para publicar hoy."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"

          PUBLISHED=""
          TITLES=""
          COUNT=0
          while IFS= read -r line; do
            FILE=$(echo "$line" | cut -d' ' -f2)
            BASENAME=$(basename "$FILE")
            TITLE=$(grep -m1 '^title:' "$FILE" | sed 's/title:[[:space:]]*"\{0,1\}\(.*\)"\{0,1\}/\1/' | sed 's/"$//')
            SLUG=$(echo "$BASENAME" | sed 's/\.md$//')
            mv "$FILE" "content/blog/$BASENAME"
            PUBLISHED="${PUBLISHED}${BASENAME}\n"
            TITLES="${TITLES}• ${TITLE:-$SLUG}\n"
            COUNT=$((COUNT + 1))
            echo "Publicado: $BASENAME"
          done <<< "$DRAFTS"

          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          # Guardar títulos para la notificación (multiline)
          {
            echo "titles<<EOFTITLES"
            echo -e "$TITLES"
            echo "EOFTITLES"
          } >> "$GITHUB_OUTPUT"
          echo "Publicados $COUNT posts."

      - name: Commit y push
        if: steps.publish-drafts.outputs.found == 'true'
        env:
          PUBLISHED_COUNT: ${{ steps.publish-drafts.outputs.count }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ content/drafts/
          git commit -m "Publicar ${PUBLISHED_COUNT} post(s) programado(s)"
          git push

      - name: Notificar Telegram (publicación)
        if: steps.publish-drafts.outputs.found == 'true'
        env:
          COUNT: ${{ steps.publish-drafts.outputs.count }}
          TITLES: ${{ steps.publish-drafts.outputs.titles }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            TEXT=$(cat <<EOFMSG
          📝 <b>Publicación diaria en Ferrados.com</b>

          Se publicaron <b>${COUNT}</b> post(s):

          ${TITLES}
          🔗 <a href="https://ferrados.com/blog">Ver blog</a>
          EOFMSG
          )
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$TEXT" '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')"
          fi

      - name: Contar drafts restantes
        id: count
        run: |
          REMAINING=$(find content/drafts -name "*.md" -type f 2>/dev/null | wc -l)
          echo "remaining=$REMAINING" >> "$GITHUB_OUTPUT"
          echo "Quedan $REMAINING drafts en cola."

      - name: Alerta stock bajo
        if: fromJSON(steps.count.outputs.remaining) <= 4
        env:
          REMAINING: ${{ steps.count.outputs.remaining }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ Quedan solo ${REMAINING} posts en cola" \
            --body "El pipeline de publicación automática tiene solo **${REMAINING}** posts pendientes en \`content/drafts/\`. Es hora de generar más contenido." \
            --label "content" || echo "No se pudo crear issue (¿existe el label 'content'?)"

      - name: Notificar Telegram (stock bajo)
        if: fromJSON(steps.count.outputs.remaining) <= 4
        env:
          REMAINING: ${{ steps.count.outputs.remaining }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "⚠️ Quedan solo ${REMAINING} posts en cola en Ferrados.com. Hora de generar más contenido." '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')"
          fi
